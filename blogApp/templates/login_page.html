{% extends "base.html" %}

{% block content %}
<div class="container">
    <form method="post" action="{% url 'login-page' %}" class="col-md-6 col-sm-8 col-xs-10 mx-auto card p-4 shadow-lg mt-4">
        {% csrf_token %}
        <h2 class="text-center mb-4">Login</h2>
        <div class="form-group">
            <label for="inputUsername">Username</label>
            <input type="text" name="username" class="form-control" id="inputUsername" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="inputPassword">Password</label>
            <input type="password" name="password" class="form-control" id="inputPassword" placeholder="Password">
        </div>
        <div class="text-center">
            <p>Don't have an account? <strong><a href="{% url 'register-page' %}">Register</a></strong></p>
            <button type="submit" class="btn btn-primary mt-3">Login</button>
        </div>
    </form>
</div>
{% endblock %}
